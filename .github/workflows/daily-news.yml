name: Daily News Email

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 9 * * *' # Runs daily at 9:00 AM UTC

jobs:
  send-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Run main script
        run: python main.py > news_body.txt

      - name: Send email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.office365.com # CHANGE THIS to your email provider's SMTP server
          server_port: 587                   # CHANGE THIS if your provider uses 465 instead of 587
          username: ${{ secrets.EMAIL_USER }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: Daily Market Update
          html_body: file://news_body.txt
          to: ${{ secrets.EMAIL_RECIPIENT }}
         - name: Send email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.office365.com 
          server_port: 587                   
          username: ${{ secrets.EMAIL_USER }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: Daily Market Update
          html_body: file://news_body.txt
          to: ${{ secrets.EMAIL_RECIPIENT }}
          from: "Daily Bot <your-actual-email@example.com>" # Type your actual email here
